# Application
quarkus.application.name=get-up-and-walk

# HTTP
quarkus.http.port=8080

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,https://localhost:5173,https://192.168.1.19:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# Auth permissions - public paths
quarkus.http.auth.permission."public".paths=/api/auth/*
quarkus.http.auth.permission."public".policy=permit

quarkus.http.auth.permission."authenticated".paths=/api/*
quarkus.http.auth.permission."authenticated".policy=authenticated

# Dev datasource (H2)
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:getupandwalk;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true

# Test datasource (H2)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:getupandwalk-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# Prod datasource (PostgreSQL)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=getupandwalk
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/getupandwalk
%prod.quarkus.hibernate-orm.database.generation=update

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=get-up-and-walk
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=86400
smallrye.jwt.new-token.issuer=get-up-and-walk
